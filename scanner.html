<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0E5A7A">
<title>Scanner — Ristoflow Tasting</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;user-select:none;}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;}
#login h1{font-size:22px;font-weight:800;margin-bottom:4px;}
#login p{font-size:14px;color:#888;margin-bottom:32px;}
.dots{display:flex;gap:12px;margin-bottom:28px;}
.dot{width:18px;height:18px;border-radius:50%;background:#2a2a2a;border:2px solid #444;transition:all .15s;}
.dot.on{background:#0E5A7A;border-color:#0E5A7A;}
.pad{display:grid;grid-template-columns:repeat(3,80px);gap:14px;}
.k{width:80px;height:80px;border-radius:20px;border:none;background:#1e1e1e;color:#fff;font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:rgba(14,90,122,.3);}
.k:active{background:#0E5A7A;}
.k.empty{background:transparent;cursor:default;}
.k.del{font-size:20px;color:#888;}
#lerr{color:#ef4444;font-size:13px;margin-top:16px;min-height:20px;text-align:center;}

/* SCANNER */
#app{display:none;flex-direction:column;height:100vh;}
#topbar{background:#111;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#topbar .ev{font-size:14px;font-weight:700;}
#topbar .op{font-size:11px;color:#888;margin-top:2px;}
#topbar button{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#888;font-size:12px;padding:6px 10px;cursor:pointer;}
#cam-box{position:relative;background:#000;flex-shrink:0;}
#video{width:100%;display:block;max-height:55vh;object-fit:cover;}
#canvas{display:none;}
.frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.sq{width:200px;height:200px;position:relative;}
.sq::before,.sq::after,.sq .tr,.sq .bl{content:'';position:absolute;width:36px;height:36px;border-color:#fff;border-style:solid;}
.sq::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:3px 0 0 0;}
.sq::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 3px 0;}
.sq .tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 3px 0 0;}
.sq .bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 3px;}
.line{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,#0E5A7A,transparent);animation:sc 2s linear infinite;}
@keyframes sc{0%{top:8px}100%{top:calc(100% - 8px)}}
#status{position:absolute;bottom:10px;width:100%;text-align:center;font-size:13px;font-weight:600;color:#fff;text-shadow:0 1px 4px #000;}
#btn-manual-toggle{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 10px;font-size:12px;color:#fff;cursor:pointer;}
#manual-bar{background:#111;padding:10px 14px;display:none;gap:8px;}
#manual-bar input{flex:1;background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-size:14px;outline:none;}
#manual-bar button{background:#0E5A7A;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:10px 14px;cursor:pointer;}
#result{flex:1;overflow-y:auto;padding:14px;}
.rcard{border-radius:14px;padding:18px;text-align:center;margin-bottom:10px;}
.rcard.ok{background:linear-gradient(135deg,#16a34a,#15803d);}
.rcard.err{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.rcard.warn{background:linear-gradient(135deg,#d97706,#b45309);}
.rcard .ico{font-size:44px;margin-bottom:8px;}
.rcard .tit{font-size:20px;font-weight:800;}
.rcard .sub{font-size:14px;opacity:.85;margin-top:4px;}
.info{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:10px;}
.irow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a2a2a;font-size:13px;}
.irow:last-child{border:none;}
.irow .lb{color:#888;}
.irow .vl{font-weight:700;}
.cons-box{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:10px;}
.cons-box .ct{font-size:11px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:10px;}
.cons-n{font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;}
.cons-n span{font-size:14px;font-weight:400;color:#888;}
.cbar{background:#2a2a2a;border-radius:6px;height:10px;margin-bottom:12px;overflow:hidden;}
.cbar-fill{height:100%;background:linear-gradient(90deg,#0E5A7A,#00c896);border-radius:6px;transition:width .4s;}
.btn-sc{width:100%;padding:13px;border-radius:12px;border:none;background:#0E5A7A;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn-sc:disabled{background:#2a2a2a;color:#666;}
.btn-new{width:100%;padding:13px;border-radius:12px;border:1px solid #333;background:transparent;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
#statsbar{background:#111;border-top:1px solid #1e1e1e;display:flex;flex-shrink:0;}
.sv{flex:1;text-align:center;padding:10px 0;}
.sv .n{font-size:20px;font-weight:800;}
.sv .l{font-size:10px;color:#888;text-transform:uppercase;}
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:999;transition:opacity .08s;}
</style>
</head>
<body>

<div id="login">
  <div style="font-size:48px;margin-bottom:8px;">🎟️</div>
  <h1>Ristoflow Tasting</h1>
  <p>Inserisci il tuo PIN</p>
  <div class="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="pad">
    <button class="k" data-n="1">1</button>
    <button class="k" data-n="2">2</button>
    <button class="k" data-n="3">3</button>
    <button class="k" data-n="4">4</button>
    <button class="k" data-n="5">5</button>
    <button class="k" data-n="6">6</button>
    <button class="k" data-n="7">7</button>
    <button class="k" data-n="8">8</button>
    <button class="k" data-n="9">9</button>
    <button class="k empty" data-n=""></button>
    <button class="k" data-n="0">0</button>
    <button class="k del" data-n="del">⌫</button>
  </div>
  <div id="lerr"></div>
</div>

<div id="app">
  <div id="topbar">
    <div>
      <div class="ev" id="ev-nome">—</div>
      <div class="op" id="op-nome">—</div>
    </div>
    <button onclick="logout()">Esci</button>
  </div>

  <div id="cam-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="frame"><div class="sq"><div class="tr"></div><div class="bl"></div><div class="line"></div></div></div>
    <div id="status">Inquadra il QR code</div>
    <button id="btn-manual-toggle">✏️ Manuale</button>
  </div>

  <div id="manual-bar">
    <input id="manual-in" type="text" placeholder="Token o codice QR...">
    <button id="btn-cerca">Cerca</button>
  </div>

  <div id="result"></div>

  <div id="statsbar">
    <div class="sv"><div class="n" id="s-ent">0</div><div class="l">Entrati</div></div>
    <div class="sv"><div class="n" id="s-con">0</div><div class="l">Consumaz.</div></div>
    <div class="sv"><div class="n" id="s-err">0</div><div class="l">Errori</div></div>
  </div>
</div>

<div id="flash"></div>

<script>
var SUPA_URL = 'https://cuhcscpvhypoaplcmtjk.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGNzY3B2aHlwb2FwbGNtdGprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MjY4MjgsImV4cCI6MjA3OTQwMjgyOH0.q9zAs0oh8F1-whtORHBIORF5jIn1NTS3LvSMWleP0a0';
var db = supabase.createClient(SUPA_URL, SUPA_KEY);

var pin = '';
var op = null;
var evento = null;
var scanning = true;
var lastQR = '';
var lastQRt = 0;
var stats = {ent:0, con:0, err:0};
var audioCtx = null;

// ── PIN ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.k').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var n = btn.dataset.n;
    if (n === 'del') { pin = pin.slice(0,-1); aggiornaDots(); return; }
    if (!n || pin.length >= 4) return;
    pin += n;
    aggiornaDots();
    if (pin.length === 4) setTimeout(doLogin, 150);
  });
});

function aggiornaDots() {
  for (var i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('on', i < pin.length);
  }
}

async function doLogin() {
  document.getElementById('lerr').textContent = '';
  try {
    var r = await fetch(SUPA_URL + '/functions/v1/verifica-pin-scanner', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pin: pin})
    });
    var d = await r.json();
    if (!d.success) {
      document.getElementById('lerr').textContent = d.error || 'PIN non valido';
      pin = ''; aggiornaDots(); buzz('err'); return;
    }
    op = d.operatore;
    var eventi = d.eventi || [];
    if (!eventi.length) {
      document.getElementById('lerr').textContent = 'Nessun evento attivo';
      pin = ''; aggiornaDots(); return;
    }
    if (eventi.length === 1) avvia(eventi[0]);
    else scegliEvento(eventi);
  } catch(e) {
    document.getElementById('lerr').textContent = 'Errore connessione';
    pin = ''; aggiornaDots();
  }
}

function scegliEvento(eventi) {
  document.getElementById('login').innerHTML =
    '<div style="padding:24px;width:100%;max-width:360px;">' +
    '<div style="font-size:18px;font-weight:800;margin-bottom:16px;">Seleziona evento</div>' +
    eventi.map(function(e){
      return '<button onclick="avvia('+JSON.stringify(e).replace(/"/g,"'")+')"\
        style="width:100%;padding:16px;border-radius:12px;border:1px solid #333;background:#1e1e1e;color:#fff;text-align:left;margin-bottom:10px;cursor:pointer;">\
        <div style="font-size:15px;font-weight:700;">'+esc(e.nome)+'</div>\
        <div style="font-size:12px;color:#888;margin-top:4px;">'+(e.data_evento?new Date(e.data_evento).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}):'')+'</div>\
      </button>';
    }).join('') + '</div>';
}

function avvia(ev) {
  evento = ev;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('ev-nome').textContent = ev.nome;
  document.getElementById('op-nome').textContent = op.nome;
  startCamera();
}

function logout() {
  if (confirm('Esci?')) location.reload();
}

// ── CAMERA ───────────────────────────────────────────────────────────────
function startCamera() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(stream){
      video.srcObject = stream;
      video.play();
      video.addEventListener('loadedmetadata', function(){
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        requestAnimationFrame(tick);
      });
    })
    .catch(function(){
      document.getElementById('status').textContent = '⚠️ Camera non disponibile';
      document.getElementById('manual-bar').style.display = 'flex';
    });
}

function tick() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    var ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    var img = ctx.getImageData(0,0,canvas.width,canvas.height);
    var code = jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
    if (code && code.data) {
      var now = Date.now();
      if (code.data !== lastQR || now - lastQRt > 3000) {
        lastQR = code.data; lastQRt = now;
        if (scanning) processQR(code.data);
      }
    }
  }
  requestAnimationFrame(tick);
}

// ── MANUALE ───────────────────────────────────────────────────────────────
document.getElementById('btn-manual-toggle').addEventListener('click', function(){
  var bar = document.getElementById('manual-bar');
  bar.style.display = bar.style.display === 'flex' ? 'none' : 'flex';
  if (bar.style.display === 'flex') document.getElementById('manual-in').focus();
});
document.getElementById('btn-cerca').addEventListener('click', function(){
  var v = document.getElementById('manual-in').value.trim();
  if (v) processQR(v);
});
document.getElementById('manual-in').addEventListener('keydown', function(e){
  if (e.key === 'Enter') { var v = this.value.trim(); if(v) processQR(v); }
});

// ── PROCESSA QR ───────────────────────────────────────────────────────────
async function processQR(raw) {
  scanning = false;
  document.getElementById('status').textContent = '⏳ Verifica...';

  var token = raw;
  var m = raw.match(/[?&]t=([^&]+)/);
  if (m) token = m[1];

  var res = await db.from('ticket_biglietti')
    .select('id,qr_code,token_pubblico,stato,nome_partecipante,consumazioni_totali,consumazioni_usate,attivato_at,evento_id,ticket_categorie_prezzo(id,nome,tipo),ticket_slot(data,ora_inizio,ora_fine)')
    .or('token_pubblico.eq.'+token+',qr_code.eq.'+token)
    .maybeSingle();

  var b = res.data;
  if (!b) { showErr('QR non riconosciuto', 'Biglietto non trovato'); return; }
  if (evento && b.evento_id !== evento.id) { showErr('Evento diverso', 'Biglietto per altro evento'); return; }
  if (b.stato === 'annullato') { showErr('Annullato', 'Biglietto annullato'); return; }

  var tipo = b.ticket_categorie_prezzo?.tipo || 'ingresso';

  if (b.stato === 'usato' && tipo === 'ingresso') {
    showErr('Già entrato', 'Entrato il ' + fdt(b.attivato_at));
    return;
  }

  if (b.stato === 'attivo' || b.stato === 'pagato') {
    await db.from('ticket_biglietti').update({stato:'usato', attivato_at: new Date().toISOString()}).eq('id', b.id);
    b.stato = 'usato'; b.attivato_at = new Date().toISOString();
    stats.ent++; aggiornaStats();
  }

  showOk(b);
}

// ── SHOW OK ───────────────────────────────────────────────────────────────
function showOk(b) {
  var cat = b.ticket_categorie_prezzo;
  var slot = b.ticket_slot;
  var tipo = cat?.tipo || 'ingresso';
  var usate = b.consumazioni_usate || 0;
  var tot = b.consumazioni_totali || 0;
  var rim = Math.max(0, tot - usate);

  flash('ok'); buzz('ok');
  document.getElementById('status').textContent = '✅ OK';

  var h = '';
  h += '<div class="rcard ok"><div class="ico">✅</div><div class="tit">INGRESSO OK</div><div class="sub">'+esc(b.nome_partecipante||'Partecipante')+'</div></div>';
  h += '<div class="info">';
  h += row('Categoria', cat?.nome||'—');
  h += row('Tipo', tipo==='consumazione'?'🍸 Consumazione':tipo==='pacchetti'?'📦 Pacchetto':'🎫 Ingresso');
  if (slot) h += row('Orario', fo(slot.ora_inizio)+' – '+fo(slot.ora_fine));
  h += row('Ingresso', b.attivato_at ? fdt(b.attivato_at) : '—');
  h += '</div>';

  if (tipo === 'consumazione' && b.stato === 'usato') {
    var pct = tot > 0 ? Math.round(usate/tot*100) : 0;
    h += '<div class="cons-box">';
    h += '<div class="ct">Consumazioni</div>';
    h += '<div class="cons-n" id="cn">'+rim+' <span>/ '+tot+' rimanenti</span></div>';
    h += '<div class="cbar"><div class="cbar-fill" id="cf" style="width:'+pct+'%"></div></div>';
    if (rim > 0) h += '<button class="btn-sc" id="btn-scala" onclick="scala(\''+b.id+'\','+usate+','+tot+')">🍸 Scala consumazione</button>';
    else h += '<button class="btn-sc" disabled>✅ Esaurite</button>';
    h += '</div>';
  }

  h += '<button class="btn-new" onclick="newScan()">📷 Scansiona altro</button>';
  document.getElementById('result').innerHTML = h;
}

function showErr(titolo, msg) {
  flash('err'); buzz('err');
  stats.err++; aggiornaStats();
  document.getElementById('status').textContent = '❌ ' + titolo;
  document.getElementById('result').innerHTML =
    '<div class="rcard err"><div class="ico">❌</div><div class="tit">'+esc(titolo)+'</div><div class="sub">'+esc(msg)+'</div></div>' +
    '<button class="btn-new" onclick="newScan()">📷 Scansiona altro</button>';
}

// ── CONSUMAZIONE ──────────────────────────────────────────────────────────
async function scala(id, usate, tot) {
  var nuove = usate + 1;
  await db.from('ticket_biglietti').update({consumazioni_usate: nuove}).eq('id', id);
  stats.con++; aggiornaStats();
  buzz('con');
  var rim = Math.max(0, tot - nuove);
  var pct = Math.round(nuove/tot*100);
  var cn = document.getElementById('cn');
  var cf = document.getElementById('cf');
  var bs = document.getElementById('btn-scala');
  if (cn) cn.innerHTML = rim + ' <span>/ '+tot+' rimanenti</span>';
  if (cf) cf.style.width = pct + '%';
  if (bs) {
    if (rim <= 0) { bs.disabled=true; bs.textContent='✅ Esaurite'; }
    else bs.onclick = function(){ scala(id, nuove, tot); };
  }
}

function newScan() {
  scanning = true; lastQR = '';
  document.getElementById('result').innerHTML = '';
  document.getElementById('status').textContent = 'Inquadra il QR code';
  document.getElementById('manual-in').value = '';
}

// ── STATS ─────────────────────────────────────────────────────────────────
function aggiornaStats() {
  document.getElementById('s-ent').textContent = stats.ent;
  document.getElementById('s-con').textContent = stats.con;
  document.getElementById('s-err').textContent = stats.err;
}

// ── FX ────────────────────────────────────────────────────────────────────
function flash(tipo) {
  var f = document.getElementById('flash');
  f.style.background = tipo==='ok'?'rgba(22,163,74,.35)':'rgba(220,38,38,.35)';
  f.style.opacity = '1';
  setTimeout(function(){ f.style.opacity='0'; }, 250);
}

function buzz(tipo) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    var t = audioCtx.currentTime;
    if (tipo==='ok') { o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1100,t+.1); g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.3); o.start(); o.stop(t+.3); }
    else if (tipo==='con') { o.frequency.setValueAtTime(660,t); g.gain.setValueAtTime(.2,t); g.gain.exponentialRampToValueAtTime(.001,t+.2); o.start(); o.stop(t+.2); }
    else { o.frequency.setValueAtTime(220,t); g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.4); o.start(); o.stop(t+.4); }
  } catch(e){}
  try { if(tipo==='ok') navigator.vibrate&&navigator.vibrate([80,40,80]); else navigator.vibrate&&navigator.vibrate([200,80,200]); } catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function row(l,v){return '<div class="irow"><span class="lb">'+esc(l)+'</span><span class="vl">'+esc(v)+'</span></div>';}
function fo(t){return t?t.slice(0,5):'—';}
function fdt(ts){return ts?new Date(ts).toLocaleString('it-IT',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'—';}
</script>
</body>
</html>
